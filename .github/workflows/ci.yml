name: CI FlyTrack

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Ejecutar pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas y generar reporte de cobertura
        run: mvn -f flytrack/pom.xml verify

      - name: Publicar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: flytrack/target/surefire-reports/

      - name: Publicar reporte de cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: flytrack/target/site/jacoco/

  build:
    name: Construir artefacto
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Empaquetar aplicación
        run: mvn -f flytrack/pom.xml package -DskipTests -B

      - name: Publicar JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: flytrack-jar
          path: flytrack/target/*.jar

  docker-publish:
    name: Publicar imagen a staging (GHCR)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: flytrack
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flytrack:latest
            ghcr.io/${{ github.repository_owner }}/flytrack:${{ github.sha }}
