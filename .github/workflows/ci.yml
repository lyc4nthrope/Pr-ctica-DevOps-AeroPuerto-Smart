name: CI FlyTrack

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Pruebas + cobertura JaCoCo
  # ─────────────────────────────────────────────
  test:
    name: Ejecutar pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas y generar reporte de cobertura
        run: mvn -f flytrack/pom.xml verify

      - name: Publicar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: flytrack/target/surefire-reports/

      - name: Publicar reporte de cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: flytrack/target/site/jacoco/

  # ─────────────────────────────────────────────
  # Job 2: Empaquetar JAR
  # ─────────────────────────────────────────────
  build:
    name: Construir artefacto
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Empaquetar aplicación
        run: mvn -f flytrack/pom.xml package -DskipTests -B

      - name: Publicar JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: flytrack-jar
          path: flytrack/target/*.jar

  # ─────────────────────────────────────────────
  # Job 3: Publicar imagen en GHCR (solo en push)
  # ─────────────────────────────────────────────
  docker-publish:
    name: Publicar imagen a staging (GHCR)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/flytrack:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: flytrack
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flytrack:latest
            ghcr.io/${{ github.repository_owner }}/flytrack:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Job 4: Smoke-test — despliegue efímero en runner
  # Levanta el contenedor, valida los 3 endpoints
  # y lo destruye. Garantiza que la imagen funciona.
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke test en staging efímero
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Iniciar sesión en GHCR para pull
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Desplegar contenedor en staging efímero
        run: |
          docker run -d \
            --name flytrack-staging \
            -p 8080:8080 \
            ghcr.io/${{ github.repository_owner }}/flytrack:${{ github.sha }}

      - name: Esperar a que la aplicación arranque
        run: |
          echo "Esperando que Spring Boot inicie..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/api/vuelos > /dev/null; then
              echo " Aplicación lista en intento $i"
              break
            fi
            echo "Intento $i/15 — esperando 3s..."
            sleep 3
          done

      - name: "Smoke test: GET /api/vuelos"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/vuelos)
          echo "GET /api/vuelos → HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo " Falló" && exit 1)

      - name: "Smoke test: GET /api/vuelos/1"
        run: |
          RESP=$(curl -sf http://localhost:8080/api/vuelos/1)
          echo "Respuesta: $RESP"
          echo "$RESP" | grep -q '"numero"' || (echo "JSON inválido" && exit 1)
          echo "Campo 'numero' presente"

      - name: "Smoke test: GET /api/puertas/AV101"
        run: |
          RESP=$(curl -sf http://localhost:8080/api/puertas/AV101)
          echo "Respuesta: $RESP"
          echo "$RESP" | grep -q '"puerta"' || (echo "JSON inválido" && exit 1)
          echo "Campo 'puerta' presente"

      - name: "Smoke test: POST /api/equipaje/reporte"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/api/equipaje/reporte \
            -H "Content-Type: application/json" \
            -d '{"pasajero":"Pipeline Test","vuelo":"AV101","descripcion":"Smoke test automatizado"}')
          echo "POST /api/equipaje/reporte → HTTP $STATUS"
          [ "$STATUS" = "201" ] || (echo "Falló (esperado 201, obtuvo $STATUS)" && exit 1)
          echo "Reporte creado correctamente"

      - name: "Smoke test: GET /api/puertas (nuevo endpoint)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/puertas)
          echo "GET /api/puertas → HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo " Falló" && exit 1)

      - name: Limpiar contenedor de staging
        if: always()
        run: |
          docker stop flytrack-staging || true
          docker rm flytrack-staging || true

      - name: Resumen del smoke test
        if: always()
        run: |
          echo "============================================"
          echo "  SMOKE TEST COMPLETADO"
          echo "  Imagen: ghcr.io/${{ github.repository_owner }}/flytrack:${{ github.sha }}"
          echo "  Endpoints validados: 5/5"
          echo "============================================"

  deploy-ec2:
    name: Desplegar en AWS EC2
    needs: smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop flytrack-app || true
            docker rm flytrack-app || true
            docker pull ghcr.io/lyc4nthrope/flytrack:latest
            docker run -d \
              --name flytrack-app \
              --restart unless-stopped \
              -p 8080:8080 \
              ghcr.io/lyc4nthrope/flytrack:latest
            echo "FlyTrack desplegado en $(curl -s ifconfig.me):8080"